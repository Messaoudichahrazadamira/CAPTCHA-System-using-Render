<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Captcha Verification</title>

<style>

body{
    font-family: "Segoe UI", Arial;
    background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    margin:0;
}

.container{
    background: linear-gradient(315deg, #070707, #4F4F4F);
    padding:40px;
    width:420px;
    border-radius:15px;
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

h1{
    margin-bottom:5px;
    color : white;

}

.subtitle{
    color:white;
    font-size:16px;
    margin-bottom:20px;
}



.captcha-box{
    margin:20px 0;
}

#captcha_img{
    width:280px;
    border-radius:10px;
    border:1px solid #ddd;
}

.reload-btn{
    margin-top:10px;
    font-size:13px;
    cursor:pointer;
    background:#f1f1f1;
    border:none;
    padding:6px 12px;
    border-radius:6px;
}

.reload-btn:hover{
    background:#ddd;
}

input{
    width:70%;
    padding:10px;
    font-size:16px;
    border-radius:8px;
    border:1px solid #ccc;
}

.verify-btn{
    padding:10px 18px;
    font-size:16px;
    border:none;
    border-radius:8px;
    background:#007BFF;
    color:white;
    cursor:pointer;
    margin-left:5px;
}

.verify-btn:hover{
    background:#0056b3;
}

#result{
    margin-top:20px;
    font-weight:bold;
}

</style>
</head>

<body>

<div class="container">

<h1>Human Verification</h1>
<div class="subtitle">Please confirm you are not a robot</div>


<div class="captcha-box">
<img id="captcha_img" src="/static/captcha.png">
<br>
<button class="reload-btn" onclick="reloadCaptcha()">🔄 Reload Image</button>
</div>

<div>
<input id="captcha_input" placeholder="Enter captcha text">
<button class="verify-btn" onclick="verify()">Verify</button>
</div>

<h3 id="result"></h3>

</div>

<script>

const BASE_URL = "";
//const BASE_URL = "http://127.0.0.1:5000";

async function verify(){

const inputField = document.getElementById("captcha_input");
const resultText = document.getElementById("result");

const res = await fetch(`${BASE_URL}/verify`,{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({captcha:inputField.value})
});

const data = await res.json();

if(data.status==="verified"){
resultText.innerText="✅ Success! You are human.";
resultText.style.color="green";
}else{
resultText.innerText="❌ Failed. Try again.";
resultText.style.color="red";
reloadCaptcha();
inputField.value="";
}

}

async function reloadCaptcha(){

await fetch(`${BASE_URL}/captcha`);

const img=document.getElementById("captcha_img");
img.src=`${BASE_URL}/static/captcha.png?t=${new Date().getTime()}`;

}

</script>

</body>
</html>
